name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main # Or 'master' - the branch you want to deploy from

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the project folder
            cd /var/www/yourproject
            
            # Reset any local changes (important for automated deploys)
            git reset --hard
            
            # Pull latest changes
            git pull origin main
            
            # Install dependencies (use ci for faster, cleaner production installs)
            npm ci --production
            
            # Reload the app using PM2 (zero downtime reload)
            pm2 reload my-website